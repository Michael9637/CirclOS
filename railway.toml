[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No-op metadata change to trigger a fresh Railway deployment.
startCommand = "python -c \"import os,uvicorn; uvicorn.run('main:app', host='0.0.0.0', port=int(os.getenv('PORT', '8000')))\""
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
